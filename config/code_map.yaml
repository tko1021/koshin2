# ============================================================
# 値変換テーブル / 固定値（master値 → DIPS出力値）
# 様式・運用改定時は、原則このファイルと mapping.yaml の修正のみで追従する。
# 出典: DIPS操作マニュアル＜更新講習修了者情報連携編＞Ver2026/3/23 /
#       master「修了者マスタ」入力規則（ドロップダウン）・記入要領シート。
# ============================================================

# 固定値（mapping.yaml の source.ref から参照）
fixed:
  pa_certificate_no: "PA000000000000"   # col7 検査証明書番号は常に固定
                                        # ※master AB列の実PA番号（PA0000260600xx 等）は出力禁止

# ------------------------------------------------------------
# col5 区分 : 資格区分 → 1/2
#   一等・二等の両方保有者は "1"（＝値に「一等」を含めば1）。
#   master入力規則: { 一等, 二等 }
# ------------------------------------------------------------
kubun:
  match: contains            # priority 順に部分一致で判定
  priority: ["一等", "二等"]
  table:
    "一等": "1"
    "二等": "2"

# ------------------------------------------------------------
# col6 停止処分者向け講習受講有無 ※直感と逆
#   受講なし=「無」→ "1" / 受講あり=「有」→ "2"。空欄は「無」とみなし "1"。
#   master入力規則: { 無, 有 }
# ------------------------------------------------------------
teishi:
  match: exact
  blank: "1"                 # 空欄＝無扱い
  table:
    "無": "1"
    "有": "2"

# ------------------------------------------------------------
# col16 状態フラグ : 登録種別 → 1/2/3
#   master入力規則: { 1：新規, 2：上書き修正, 3：無効化 }
# ------------------------------------------------------------
jotai:
  match: leading_digit       # 先頭1文字（1/2/3）を採用。全角コロン以降の文言は無視
  table:
    "1：新規": "1"
    "2：上書き修正": "2"
    "3：無効化": "3"

# ------------------------------------------------------------
# 参考: 講習区分 → 修了証明書番号の接頭辞（検証用。番号自体は master が採番）
#   master入力規則: { UC：更新講習, EL：失効再交付講習 }
# ------------------------------------------------------------
koushu_prefix:
  match: leading_token       # 全角コロンより前を採用（"UC：更新講習" → "UC"）
  table:
    "UC：更新講習": "UC"
    "EL：失効再交付講習": "EL"
